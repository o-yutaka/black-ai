<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  background:black;
  color:white;
  font-family:-apple-system;
  margin:0;
}

#log {
  padding:10px;
  padding-bottom:80px;
  display:flex;
  flex-direction:column;
}

.msg {
  margin:6px 0;
  padding:10px;
  border-radius:10px;
  max-width:85%;
}

.user {
  background:#111;
  align-self:flex-end;
}

.ai {
  background:#000;
}

#inputBox {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:black;
  padding:10px;
}

input {
  flex:1;
  padding:12px;
  font-size:16px;
  border-radius:10px;
  border:1px solid #333;
  background:black;
  color:white;
}

button {
  margin-left:8px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:white;
  color:black;
}
</style>
</head>

<body>

<div id="log"></div>

<div id="inputBox">
<input id="goal" placeholder="type...">
<button onclick="run()">→</button>
</div>

<script>
document.getElementById("goal").addEventListener("keydown", e=>{
  if(e.key==="Enter") run();
});

function run(){
  let input=document.getElementById("goal");
  let goal=input.value;

  if(!goal)return;

  let log=document.getElementById("log");

  // ユーザー表示
  let u=document.createElement("div");
  u.className="msg user";
  u.innerText=goal;
  log.appendChild(u);

  // 仮AI（今はダミー）
  let a=document.createElement("div");
  a.className="msg ai";
  a.innerText="...";
  log.appendChild(a);

  setTimeout(()=>{
    a.innerText="考え中...";
  },500);

  input.value="";

  window.scrollTo(0,document.body.scrollHeight);
}
</script>

</body>
</html>
