<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACK UI</title>
</head>

<body style="margin:0;background:black;color:#0f0;font-family:monospace;">

<div style="display:flex;flex-direction:column;height:100vh;">

    <!-- header -->
    <div style="padding:10px;text-align:center;border-bottom:1px solid #0f0;">
        BLACK
    </div>

    <!-- log -->
    <div id="log" style="flex:1;overflow-y:auto;padding:10px;"></div>

    <!-- input -->
    <div style="display:flex;padding:10px;border-top:1px solid #0f0;">
        <input id="goal"
            placeholder="Type goal..."
            style="flex:1;padding:10px;background:#111;color:#0f0;border:1px solid #0f0;border-radius:5px;"
            onkeydown="if(event.key==='Enter') run()"
        />
        <button onclick="run()"
            style="margin-left:10px;padding:10px;background:#0f0;color:black;border:none;border-radius:5px;">
            SEND
        </button>
    </div>

</div>

<script>
let ws;

function connect(){
    ws = new WebSocket("wss://black-ai-co4j.onrender.com/ws");

    ws.onmessage = (msg) => {
        let data = JSON.parse(msg.data);

        let div = document.createElement("div");
        div.style.margin = "10px 0";

        if(data.type === "thinking"){
            div.innerText = "⚡ " + data.data.type + " | " + data.data.score.toFixed(2);
        }

        if(data.type === "winner"){
            div.innerText = "🔥 " + data.data.type;
            div.style.color = "yellow";
        }

        if(data.type === "evolution"){
            div.innerText = "🧬 evolved";
            div.style.color = "#0ff";
        }

        let log = document.getElementById("log");
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    };

    ws.onclose = () => setTimeout(connect, 1000);
}

connect();

function run(){
    let input = document.getElementById("goal");
    let goal = input.value;

    if(!goal) return;

    if(ws.readyState !== 1){
        alert("connecting...");
        return;
    }

    // 自分の入力表示
    let my = document.createElement("div");
    my.innerText = "🧠 " + goal;
    my.style.textAlign = "right";
    my.style.margin = "10px 0";
    document.getElementById("log").appendChild(my);

    ws.send(JSON.stringify({goal}));

    input.value = "";
}
</script>

</body>
</html>
