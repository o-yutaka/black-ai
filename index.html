　<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>BLACK</title>

<style>
body {
    background:black;
    color:white;
    font-family:-apple-system;
    margin:0;
}

#log {
    padding:15px;
    padding-bottom:90px;
    display:flex;
    flex-direction:column;
}

.msg {
    margin:6px 0;
    padding:10px 12px;
    border-radius:10px;
    max-width:90%;
}

.user {
    background:#111;
    align-self:flex-end;
}

.ai {
    background:black;
}

#inputBox {
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    padding:10px;
    background:black;
    border-top:1px solid #222;
}

#goal {
    flex:1;
    font-size:16px;
    padding:12px;
    background:black;
    color:white;
    border:1px solid #333;
    border-radius:10px;
}

button {
    margin-left:8px;
    padding:12px;
    background:white;
    color:black;
    border:none;
    border-radius:10px;
}
</style>
</head>

<body>

<div id="log"></div>

<div id="inputBox">
<input id="goal" placeholder="type...">
<button onclick="run()">→</button>
</div>

<script>
let ws = new WebSocket("wss://black-ai-co4j.onrender.com/ws");

let answerDiv = null;

document.getElementById("goal").addEventListener("keydown", e=>{
    if(e.key==="Enter") run();
});

ws.onmessage = (msg)=>{
    let data = JSON.parse(msg.data);
    let log = document.getElementById("log");

    if(data.type==="thinking"){
        let d=document.createElement("div");
        d.className="msg ai";
        d.innerText=data.data.type;
        log.appendChild(d);
    }

    if(data.type==="winner"){
        let d=document.createElement("div");
        d.className="msg ai";
        d.innerText="→ "+data.data.type;
        log.appendChild(d);
    }

    if(data.type==="answer_start"){
        answerDiv=document.createElement("div");
        answerDiv.className="msg ai";
        log.appendChild(answerDiv);
    }

    if(data.type==="answer_stream"){
        if(answerDiv){
            answerDiv.innerText+=data.data;
        }
    }

    window.scrollTo(0,document.body.scrollHeight);
};

function run(){

    let input=document.getElementById("goal");
    let goal=input.value;

    if(!goal)return;

    let u=document.createElement("div");
    u.className="msg user";
    u.innerText=goal;

    document.getElementById("log").appendChild(u);

    ws.send(JSON.stringify({goal}));

    input.value="";

    window.scrollTo(0,document.body.scrollHeight);
}
</script>

</body>
</html>
