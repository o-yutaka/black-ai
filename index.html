<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BLACK UI</title>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>

<body style="background:black;color:#0f0;font-family:monospace">

<h2>BLACK OS</h2>

<input id="goal" placeholder="goal"/>
<button onclick="run()">RUN</button>

<div id="log"></div>

<script>
async function run(){

    let goal = document.getElementById("goal").value;

    const res = await axios.post(
        "https://black-ai-co4j.onrender.com/think",
        { goal }
    );

    let data = res.data;

    let div = document.createElement("div");

    div.innerText =
        "WINNER: " +
        data.decision.winner.strategy.type +
        " | SCORE: " +
        data.decision.winner.score.toFixed(2);

    div.style.color = "yellow";

    document.getElementById("log").appendChild(div);
}
</script>

</body>
</html>
